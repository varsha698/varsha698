name: generate snake

on:
  # Run every 24 hours
  schedule:
    - cron: "0 */24 * * *"
  # Manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%232ea044&color_dots=%23ebedf0,%23d1fae5,%236ee7b7,%2334d399,%23059669
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2334d399&color_dots=%231e293b,%23334155,%23475569,%2364748b,%2394a3b8

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
