name: generate snake

on:
  # Run every 24 hours
  schedule:
    - cron: "0 */24 * * *"
  # Manual trigger
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23ff69b4&color_dots=%23fdf2f8,%23fbcfe8,%23f9a8d4,%23f472b6,%23ec4899
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23ff69b4&color_dots=%231f2937,%23374151,%234b5563,%236b7280,%239ca3af

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
